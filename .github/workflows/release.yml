name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Bump, tag, and draft release
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Run this workflow from the main branch."
          exit 1

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Bump Info.plist version
        id: bump
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump }}
        run: >-
          python3 .github/scripts/bump_version.py
          --bump "${BUMP_TYPE}"

      - name: Verify tag is new
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
            exit 1
          fi

      - name: Run unit tests
        run: >-
          xcodebuild -project ClipMind.xcodeproj -scheme ClipMind
          -configuration Debug -destination 'platform=macOS,arch=arm64' test

      - name: Build unsigned release app
        run: >-
          xcodebuild -project ClipMind.xcodeproj -scheme ClipMind
          -configuration Release -destination 'platform=macOS,arch=arm64'
          -derivedDataPath build/DerivedData
          CODE_SIGNING_ALLOWED=NO build

      - name: Package unsigned DMG artifact
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          mkdir -p dist
          dmg_root="build/dmg-root"
          rm -rf "$dmg_root"
          mkdir -p "$dmg_root"
          ditto "build/DerivedData/Build/Products/Release/ClipMind.app" "$dmg_root/ClipMind.app"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil create \
            -volname "ClipMind ${VERSION}" \
            -srcfolder "$dmg_root" \
            -ov \
            -format UDZO \
            "dist/ClipMind-${VERSION}-unsigned.dmg"

      - name: Commit version and create tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BUILD: ${{ steps.bump.outputs.build }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag="v${VERSION}"
          git add ClipMind/Info.plist
          git commit -m "chore(release): ${tag}"
          git tag -a "$tag" -m "ClipMind ${tag} (${BUILD})"

      - name: Push version commit and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          tag="v${VERSION}"
          git push --atomic "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main "$tag"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          BUILD: ${{ steps.bump.outputs.build }}
        run: |
          tag="v${VERSION}"
          gh release create "$tag" \
            "dist/ClipMind-${VERSION}-unsigned.dmg" \
            --draft \
            --title "ClipMind ${tag}" \
            --notes "Build ${BUILD}. Unsigned DMG artifact; sign and notarize before public distribution."
