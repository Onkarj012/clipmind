name: Version

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  tag:
    name: Bump version and tag
    runs-on: macos-15
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Skip existing release bump
        id: release_guard
        if: github.event_name == 'workflow_run'
        run: |
          if git log -1 --pretty=%s | grep -q '^chore(release):'; then
            echo "Latest commit is already a release bump; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump Info.plist version
        id: bump
        if: steps.release_guard.outputs.skip != 'true'
        run: >-
          python3 .github/scripts/bump_version.py
          --bump "${{ github.event.inputs.bump || 'patch' }}"

      - name: Commit and tag version
        if: steps.release_guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          BUILD: ${{ steps.bump.outputs.build }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
            exit 1
          fi

          git add ClipMind/Info.plist
          git commit -m "chore(release): ${tag}"
          git tag -a "$tag" -m "ClipMind ${tag} (${BUILD})"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"
