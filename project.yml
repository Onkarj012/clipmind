name: ClipMind
options:
  bundleIdPrefix: io.clipmind
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO
    OTHER_SWIFT_FLAGS: $(inherited) -Xfrontend -disable-autolink-framework -Xfrontend AppIntents
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin
    from: 5.0.0
targets:
  ClipMind:
    type: application
    platform: macOS
    sources:
      - path: ClipMind
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.clipmind.ClipMind
        INFOPLIST_FILE: ClipMind/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClipMind/ClipMind.entitlements
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: ClipMind
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: LaunchAtLogin
        product: LaunchAtLogin
  ClipMindTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClipMindTests
    dependencies:
      - target: ClipMind
      - package: GRDB
        product: GRDB
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
